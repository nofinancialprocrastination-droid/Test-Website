        .header {

            justify-content: space-between;

        .nav {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav a {

            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: #90EE90;
        }
